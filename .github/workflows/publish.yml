name: pipeline
on:
  push:
    branches:
      - "main"

jobs:
  build-push:
    name: build && push image to Docker Hub
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: setup docker buildx
        uses: docker/setup-buildx-action@v2

      - name: docker login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: build and push api
        id: build-push-api
        uses: docker/build-push-action@v3
        with:
          context: ./docker
          push: true
          tags: dangan65/go_server:latest
  deploy:
    needs: build-push # Wait for the image to hit Docker Hub
    runs-on: self-hosted  # This tells GitHub to execute this on your CloudLab node!
    steps:
      - name: Deploy the updated stack
        run: |
          # The runner executes these commands directly on your CloudLab server
          docker compose pull go_app
          docker compose down
          docker compose up -d
